{{- /*gotype: github.com/sadlil/boardroom/internal/server.ClarificationData*/ -}}
<div class="bg-zinc-900/80 rounded-2xl p-8 mb-10 border border-amber-500/30 shadow-2xl shadow-black/40 relative overflow-hidden animate-fade-in">
    <div class="absolute top-0 left-0 w-full h-0.5 bg-gradient-to-r from-amber-500/80 to-amber-400/20"></div>
    <div class="flex items-center space-x-4 mb-6 pb-4 border-b border-zinc-800/60">
        <div class="w-10 h-10 rounded-xl bg-amber-500/10 flex items-center justify-center border border-amber-500/20 flex-shrink-0">
            <svg class="w-5 h-5 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        </div>
        <div>
            <h3 class="text-lg font-bold text-zinc-100 tracking-tight">A few quick questions</h3>
            <p class="text-zinc-500 text-xs mt-0.5">Help the board give you a more precise analysis</p>
        </div>
    </div>
    <div class="space-y-4 mb-8">
        <ul class="space-y-3 ml-1">
            {{range .Questions}}
            <li class="flex items-start space-x-3">
                <span class="w-5 h-5 rounded-full bg-amber-500/10 border border-amber-500/20 flex items-center justify-center flex-shrink-0 mt-0.5">
                    <span class="text-amber-400 text-[10px] font-bold">?</span>
                </span>
                <span class="text-zinc-300 text-sm leading-relaxed">{{.}}</span>
            </li>
            {{end}}
        </ul>
    </div>
    <form hx-post="/api/debate" hx-target="#board-panels" hx-swap="innerHTML" class="flex flex-col gap-4">
        <input type="hidden" name="previous_context" value="{{.EncodedContext}}">
        <input type="hidden" name="dynamic_agents" value="{{.UseDynamicAgents}}">
        <textarea name="prompt" placeholder="Share your answers here…"
            rows="3"
            onkeydown="if(event.key === 'Enter' && !event.shiftKey) { event.preventDefault(); htmx.trigger(this.form, 'submit'); }"
            class="w-full bg-zinc-950/60 border border-zinc-800/50 rounded-xl px-6 py-4 text-zinc-200 focus:outline-none focus:border-amber-500/40 transition-colors text-base resize-none" required autofocus></textarea>
        <div class="flex flex-row justify-end items-center space-x-4">
            <button type="submit" name="action" value="skip" class="text-zinc-500 hover:text-zinc-300 transition-colors px-3 py-2 text-sm font-medium rounded-lg hover:bg-zinc-800/50" formnovalidate>Skip</button>
            <button type="submit" name="action" value="submit" class="bg-amber-500 hover:bg-amber-400 text-zinc-950 outline-none font-semibold tracking-wide py-2.5 px-8 rounded-xl shadow-lg shadow-amber-500/15 transition-all transform hover:scale-[1.02] active:scale-95">Submit Answers</button>
        </div>
    </form>
</div>
